replicaCount: 2

image:
  name: payment-service
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8084

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: ""

extraEnv: []
secretEnv: []
extraVolumes: []
extraVolumeMounts: []
