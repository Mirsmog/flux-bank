replicaCount: 2

image:
  name: service-registry
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8761

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: ""

extraEnv: []
secretEnv: []
extraVolumes: []
extraVolumeMounts: []
