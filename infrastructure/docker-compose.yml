version: "3.9"

# =============================================================================
#  flux-bank — local development infrastructure
# =============================================================================

networks:
  fluxbank-net:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-accounts-data:
  postgres-transactions-data:
  postgres-payments-data:
  postgres-cards-data:
  postgres-kyc-data:
  postgres-notifications-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL instances — one database per bounded context
  # ---------------------------------------------------------------------------

  postgres-auth:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-accounts:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-accounts
    restart: unless-stopped
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-accounts-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d accounts_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-transactions:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-transactions
    restart: unless-stopped
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-transactions-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d transactions_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-payments:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-payments
    restart: unless-stopped
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5436:5432"
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-cards:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-cards
    restart: unless-stopped
    environment:
      POSTGRES_DB: cards_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5437:5432"
    volumes:
      - postgres-cards-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d cards_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-kyc:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-kyc
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyc_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5438:5432"
    volumes:
      - postgres-kyc-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d kyc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-notifications:
    image: postgres:16-alpine
    container_name: fluxbank-postgres-notifications
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: fluxbank
      POSTGRES_PASSWORD: fluxbank_pass
    ports:
      - "5439:5432"
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbank -d notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis — session cache, rate-limiting, idempotency keys
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7.2-alpine
    container_name: fluxbank-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass fluxbank_redis
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "fluxbank_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Zookeeper — required by Kafka
  # ---------------------------------------------------------------------------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fluxbank-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kafka — event streaming backbone
  # ---------------------------------------------------------------------------

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fluxbank-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # external (host → container)
      - "9093:9093"   # internal (container → container)
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:9093
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - fluxbank-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kafka UI — Provectus UI for browsing topics, messages, and consumer groups
  # ---------------------------------------------------------------------------

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fluxbank-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fluxbank-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - fluxbank-net
